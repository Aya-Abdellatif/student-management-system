<!-- add-student.component.html -->
<div class="page-wrapper fade-in-up">

    <!-- Page Header -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <button class="btn-icon-sm btn-icon-view" title="Go back">←</button>
        <div>
            <h2 class="font-heading mb-0" style="font-size: 20px; font-weight: 700;">Add New Student</h2>
            <p class="text-muted-sms mb-0" style="font-size: 13px;">Fill in the form below to add a new student</p>
        </div>
    </div>

    <form (ngSubmit)="addStudent()">
        <div class="sms-card">

            <!-- Section: Personal Info -->
            <div class="card-header-bar">
                <p class="card-title">Personal Information</p>
            </div>

            <div class="form-section">
                <div class="row g-4">

                    <div class="col-md-6">
                        <label class="form-label">First Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" class="form-control" placeholder="student first name"
                            [(ngModel)]="newStudent.firstName" name="firstName">
                        <div class="invalid-feedback">First name is required.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Last Name <span style="color:var(--danger)">*</span></label>
                        <input type="text" class="form-control" placeholder="student last name" [(ngModel)]="newStudent.lastName" name="lastName">
                        <div class="invalid-feedback">Last name is required.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email Address <span style="color:var(--danger)">*</span></label>
                        <input type="email" class="form-control" placeholder="student@university.edu"
                                   [(ngModel)]="newStudent.email" name="email">
                        <div class="invalid-feedback">Valid email address is required.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" placeholder="(+20) 00 00000000"        [(ngModel)]="newStudent.phone" name="phone">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control"        [(ngModel)]="newStudent.age" name="age">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Gender</label>
                        <select class="form-select"        [(ngModel)]="newStudent.gender" name="gender">
                            <option value="" disabled>Select gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" placeholder="Enter full address"     [(ngModel)]="newStudent.address" name="address">
                    </div>

                </div>
            </div>

            <!-- Section: Academic Info -->
            <div class="card-header-bar" style="border-top: 1px solid var(--border-light);">
                <p class="card-title">Academic Information</p>
            </div>

            <div class="form-section">
                <div class="row g-4">

                    <div class="col-md-6">
                        <label class="form-label">Department / Major <span style="color:var(--danger)">*</span></label>
                        <select class="form-select"        [(ngModel)]="newStudent.department" name="department">
                            <option value="" disabled>Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Mechatronics">Mechatronics</option>
                            <option value="Industrial">Industrial</option>
                            <option value="Petrolchemicals">Petrolchemicals</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Architectural">Architectural</option>
                        </select>
                        <div class="invalid-feedback">Please select a Department.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Year of Study <span style="color:var(--danger)">*</span></label>
                        <select class="form-select"        [(ngModel)]="newStudent.level" name="level">
                            <option value="" disabled>Select year</option>
                            <option value="1">Year 1</option>
                            <option value="2">Year 2</option>
                            <option value="3">Year 3</option>
                            <option value="4">Year 4</option>
                            <option value="5">Year 5 (Postgrad)</option>
                        </select>
                        <div class="invalid-feedback">Please select a level.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Enrollment Date</label>
                        <input type="date" class="form-control"        [(ngModel)]="newStudent.enrollmentDate" name="enrollmentDate">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Status</label>
                        <select class="form-select"        [(ngModel)]="newStudent.isActive" name="isActive">
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                            <option value="Pending">Pending Review</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- Footer Buttons -->
            <div class="form-footer">
                <button type="button" class="btn-sms-outline" (click)="reset()">Cancel</button>
                <button type="submit" class="btn-sms-primary">
                    <span>Save Student →</span>
                </button>
            </div>

        </div>
    </form>

</div>
