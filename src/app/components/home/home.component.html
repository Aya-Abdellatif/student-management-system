<!-- home.component.html -->
<div class="page-wrapper fade-in-up">

  <!-- Hero -->
  <div class="hero-section fade-in-up">
    <h1>Welcome</h1>
    <p>
      Manage your students, and keep your
      institution organized — all in one beautiful dashboard.
    </p>
    <button class="hero-btn" routerLink="/students">
      View All Students <span>→</span>
    </button>
  </div>

  <!-- Recent Students -->
  <div class="sms-card fade-in-up">
    <div class="card-header-bar">
      <p class="card-title">Recent Students</p>
      <a routerLink="/students" class="btn-sms-outline" style="font-size: 13px; padding: 7px 16px;">
        View All →
      </a>
    </div>

    <div class="table-responsive">
      <table class="sms-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Student Fullname</th>
            <th>Department</th>
            <th>Year</th>
            <th>GPA</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let student of students$ | async" [routerLink]="['/student', student.id]" class="fade-in">
            <td style="color: var(--text-muted); font-size: 13px;">
              {{ student.id }}
            </td>
            <td class="student-name">
              {{ student.firstName }} {{student.lastName}}
            </td>
            <td>
              {{student.department}}
            </td>
            <td>{{student.level}}</td>
            <td>{{student.GPA}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
