<!-- home.component.html -->
<div class="page-wrapper fade-in-up">

  <!-- Hero -->
  <div class="hero-section fade-in-up">
    <h1>Welcome, Admin</h1>
    <p>
      Manage your students, track academic performance, and keep your
      institution organized — all in one beautiful dashboard.
    </p>
    <button class="hero-btn" routerLink="/students">
      View All Students <span>→</span>
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-grid stagger">
    <!--<div class="stat-card fade-in-up" *ngFor="let stat of stats">
      <div class="stat-icon {{ stat.colorClass }}">{{ stat.icon }}</div>
      <p class="stat-num">{{ stat.value }}</p>
      <p class="stat-label">{{ stat.label }}</p>
    </div>-->
  </div>

  <!-- Recent Students -->
  <div class="sms-card fade-in-up">
    <div class="card-header-bar">
      <p class="card-title">Recent Students</p>
      <a routerLink="/students" class="btn-sms-outline" style="font-size: 13px; padding: 7px 16px;">
        View All →
      </a>
    </div>

    <div class="table-responsive">
      <table class="sms-table">
        <thead>
          <tr>
            <th>Student</th>
            <th>Course</th>
            <th>Year</th>
            <th>GPA</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
         
        </tbody>
      </table>
    </div>
  </div>

</div>
